services:
  postgres:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    image: postgres:16
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-estoque}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - abrigo_main_postgres_data:/var/lib/postgresql/data
    networks:
      - abrigo
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-pricing:
    image: postgres:16
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${PRICING_DB_NAME:-pricing_cache}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - abrigo_pricing_postgres_data:/var/lib/postgresql/data
    networks:
      - abrigo
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres_init_test_db:
    image: postgres:18
    env_file:
      - ../.env
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:-postgres}
      TEST_DB_NAME: ${TEST_DB_NAME:-estoque_test}
    command: >
      sh -c "
      until pg_isready -h postgres -U $$PGUSER; do sleep 1; done;
      createdb -h postgres -U $$PGUSER $$TEST_DB_NAME 2>/dev/null || true;
      echo 'Banco de testes $$TEST_DB_NAME garantido.';
      exit 0
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abrigo
    restart: "no"

  redis:
    image: redis:7-alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - abrigo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  temporal-postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    networks:
      - abrigo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: always
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    networks:
      - abrigo
    ports:
      - "127.0.0.1:17233:7233"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "temporal operator cluster health --address temporal:7233 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s

  temporal-ui:
    image: temporalio/ui:2.30.2
    restart: always
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://127.0.0.1:8090,http://localhost:8090
    networks:
      - abrigo
    ports:
      - "127.0.0.1:8090:8080"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
      - ../backend/.env
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRICING_API_KEY: ${PRICING_API_KEY:-}
      PRICING_BASE_URL: ${PRICING_BASE_URL:-}
      ENABLE_CRON: "false"
      ENABLE_TEMPORAL: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: abrigo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      postgres_init_test_db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - abrigo
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://127.0.0.1:3000/api/v1/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - abrigo_import_uploads:/var/lib/abrigo-imports

  temporal-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.temporal
    restart: always
    env_file:
      - ../.env
      - ../backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Mesmo valor que no backend — a activity de busca de preços corre neste processo.
      PRICING_API_KEY: ${PRICING_API_KEY:-}
      PRICING_BASE_URL: ${PRICING_BASE_URL:-}
      ENABLE_TEMPORAL: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: abrigo
    entrypoint: ["node", "dist/temporal/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - abrigo
    volumes:
      - abrigo_import_uploads:/var/lib/abrigo-imports

  temporal-init:
    build:
      context: ../backend
      dockerfile: Dockerfile.temporal
    restart: "no"
    env_file:
      - ../.env
      - ../backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      ENABLE_TEMPORAL: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: abrigo
      NOTIFICATION_BOOTSTRAP_CRON: ${NOTIFICATION_BOOTSTRAP_CRON:-*/30 * * * *}
      # Sobrescreve backend/.env (localhost:5433 = host); na rede Docker usar o serviço postgres:5432
      DB_HOST: postgres
      DB_PORT: 5432
    entrypoint: ["node", "dist/temporal/schedules.js"]
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - abrigo

  price-search:
    build:
      context: ../stokio-api-price-search
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
      - ../backend/.env
    environment:
      PORT: 3010
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      PRICING_DB_HOST: postgres-pricing
      PRICING_DB_PORT: 5432
      PRICING_DB_NAME: ${PRICING_DB_NAME:-pricing_cache}
      PRICING_DB_USER: ${DB_USER:-postgres}
      PRICING_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:3000}
      PRICING_API_KEY: ${PRICING_API_KEY}
      ENABLE_CRON: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-pricing:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - abrigo
    expose:
      - "3010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3010/health | grep -q '\"status\":\"ok\"' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-${VITE_API_BASE_URL:-http://localhost/api/v1}}
        NEXT_PUBLIC_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-${VITE_LOGO_URL:-/default_logo.png}}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-${VITE_PUBLIC_APP_NAME:-}}
        NEXT_PUBLIC_APP_LOGO_URL: ${NEXT_PUBLIC_APP_LOGO_URL:-${VITE_PUBLIC_APP_LOGO_URL:-}}
        NEXT_PUBLIC_R2_PUBLIC_BASE_URL: ${NEXT_PUBLIC_R2_PUBLIC_BASE_URL:-${VITE_R2_PUBLIC_BASE_URL:-${R2_PUBLIC_BASE_URL:-}}}
        NEXT_PUBLIC_X_API_KEY: ${NEXT_PUBLIC_X_API_KEY:-}
    restart: always
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "8081"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - abrigo
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      backend:
        condition: service_healthy
      price-search:
        condition: service_healthy

  proxy:
    image: nginx:alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./proxy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - abrigo

  # Backups agendados: Temporal schedule `system-backup-cron` + activity `runSystemBackup`
  # (runtime.scheduled_backup.* em system_config; UI no painel admin, super-admin).
  # Dump local pontual (opcional): docker compose --profile backup-tools run --rm backup-tools
  backup-tools:
    profiles: ["backup-tools"]
    build:
      context: ./backup
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKUP_UPLOAD_R2: ${BACKUP_UPLOAD_R2:-1}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:-estoque}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_REGION: ${R2_REGION:-auto}
      R2_RETENTION_COUNT: ${R2_RETENTION_COUNT:-30}
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abrigo

volumes:
  abrigo_main_postgres_data:
  abrigo_pricing_postgres_data:
  temporal_postgres_data:
  abrigo_import_uploads:

networks:
  abrigo:
    driver: bridge
